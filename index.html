<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a1020" />
    <meta name="color-scheme" content="dark" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="CADAX" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="description" content="CADAX workout tracker" />
    <title>CADAX</title>
    <style>
      html,
      body {
        background: #0a1020;
      }

      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #0a1020;
        color: #f4f7ff;
        pointer-events: none;
        opacity: 1;
        transition: opacity 180ms ease;
      }

      #boot-splash.hidden {
        opacity: 0;
      }

      #boot-splash .boot-brand {
        margin: 0;
        padding-top: calc(env(safe-area-inset-top, 0px) + 18px);
        text-align: center;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: clamp(1rem, 2.2vw, 1.15rem);
        font-weight: 700;
        font-family: 'Space Grotesk', 'IBM Plex Sans', 'Segoe UI', sans-serif;
      }
    </style>
    <link rel="icon" type="image/png" sizes="32x32" href="./cadax-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./cadax-16x16.png" />
    <link rel="icon" href="./cadax.ico" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" sizes="180x180" href="./cadax-icon.png" />
  </head>
  <body>
    <div id="boot-splash" aria-hidden="true">
      <h1 class="boot-brand">CADAX</h1>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
